<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabañas · Ecocabañas Ventana al Llano</title>
  <meta name="description" content="Conoce nuestras cabañas: El Chigüiro, El Mico (glamping) y El Perezoso. Fotos, detalles, precios y reservas." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dxfgqsp8y/image/upload/f_auto,q_auto/v1780009812/ventana-al-llano/logo_png.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green-dark: #1f3a2b; --green-mid: #355e3b; --green-light: #6b8e4e;
      --cream: #f4efe6; --sand: #d9c9a8; --terra: #b85c38; --ink: #1a1a1a; --muted: #6b6b6b; --line: #e6e0d3;
    }
    body { font-family: 'Inter', sans-serif; color: var(--ink); background: var(--cream); line-height: 1.6; }
    h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; line-height: 1.15; }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 1180px; margin: 0 auto; padding: 0 22px; }

    /* Top bar */
    .topbar { background: var(--green-dark); color: white; padding: 14px 0; position: sticky; top: 0; z-index: 50; }
    .topbar .container { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 12px; color: white; }
    .brand img { height: 40px; width: auto; background: rgba(255,255,255,.92); border-radius: 7px; padding: 4px 7px; }
    .brand small { display: block; font-size: .66rem; letter-spacing: 2.5px; text-transform: uppercase; opacity: .8; }
    .brand b { font-family: 'Cormorant Garamond', serif; font-size: 1.18rem; font-weight: 600; }
    .back-link { color: var(--sand); font-size: .9rem; font-weight: 500; }
    .back-link:hover { color: white; }

    /* Hero band */
    .head {
      color: white; padding: 56px 0 120px; text-align: center; position: relative; overflow: hidden;
      background: linear-gradient(rgba(31,58,43,.6), rgba(31,58,43,.82)),
        url('https://res.cloudinary.com/dxfgqsp8y/image/upload/f_auto,q_auto/v1780009784/ventana-al-llano/cabana-chiguiro/SaveClip_App_649228377_18009669110835757_978800948885697982_n.jpg') center/cover;
    }
    .head h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); }
    .head h1 em { font-style: italic; color: var(--sand); }
    .head p { opacity: .92; margin-top: 10px; font-weight: 300; font-size: 1.05rem; max-width: 560px; margin-left: auto; margin-right: auto; }

    .wrap { margin-top: -80px; padding-bottom: 80px; position: relative; z-index: 2; }

    /* Cards */
    .cab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr)); gap: 26px; }
    .cab {
      position: relative; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; background: #fff;
      transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s; display: flex; flex-direction: column;
      animation: cardIn .55s cubic-bezier(.2,.7,.2,1) backwards; box-shadow: 0 14px 36px -26px rgba(0,0,0,.3);
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(26px) scale(.97); } }
    .cab:hover { transform: translateY(-6px); box-shadow: 0 30px 56px -26px rgba(0,0,0,.42); }

    /* Carrusel */
    .carousel { position: relative; aspect-ratio: 16/11; overflow: hidden; background: #d8d2c4; }
    .car-track { display: flex; height: 100%; transition: transform .45s cubic-bezier(.2,.7,.2,1); }
    .car-slide { min-width: 100%; height: 100%; object-fit: cover; }
    .car-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; border-radius: 50%;
      background: rgba(0,0,0,.42); color: #fff; border: none; cursor: pointer; font-size: 1.5rem; line-height: 1;
      display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .25s, background .2s; z-index: 2; }
    .carousel:hover .car-btn { opacity: 1; }
    .car-btn:hover { background: rgba(0,0,0,.72); }
    .car-btn.prev { left: 10px; } .car-btn.next { right: 10px; }
    .car-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 2; }
    .car-dots button { width: 7px; height: 7px; border-radius: 50%; border: none; background: rgba(255,255,255,.55); cursor: pointer; padding: 0; transition: all .25s; }
    .car-dots button.active { background: #fff; width: 20px; border-radius: 4px; }
    .cab-tag { position: absolute; top: 12px; left: 12px; background: rgba(31,58,43,.85); color: white; z-index: 2;
      font-size: .72rem; padding: 5px 12px; border-radius: 50px; font-weight: 600; backdrop-filter: blur(4px); }
    .car-count { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.45); color: #fff; z-index: 2;
      font-size: .72rem; padding: 4px 10px; border-radius: 50px; backdrop-filter: blur(4px); }

    .cab-body { padding: 20px 22px; display: flex; flex-direction: column; flex: 1; }
    .cab-body h3 { font-size: 1.6rem; color: var(--green-dark); }
    .cab-desc { font-size: .9rem; color: var(--muted); margin: 8px 0 14px; flex: 1; }
    .incluye { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .incluye span { background: #f3efe5; border: 1px solid var(--line); color: var(--green-dark); font-size: .76rem; padding: 4px 11px; border-radius: 50px; }
    .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; }
    .price-row .price { font-family: 'Cormorant Garamond', serif; font-size: 2.1rem; color: var(--terra); font-weight: 600; line-height: 1; }
    .price-row .per { color: var(--muted); font-size: .82rem; }
    .cab-actions { display: flex; gap: 10px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 20px; border-radius: 50px; border: none; cursor: pointer;
      font-family: inherit; font-weight: 600; font-size: .92rem; transition: all .25s; white-space: nowrap;
    }
    .btn-primary { background: var(--terra); color: white; flex: 1; }
    .btn-primary:hover { background: #a04e2c; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--green-dark); border: 1.5px solid var(--line); flex: 1; }
    .btn-ghost:hover { background: #f0ead7; border-color: var(--green-mid); }

    .loading, .error { text-align: center; color: var(--muted); padding: 40px; grid-column: 1/-1; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(20,30,22,.62); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center; padding: 18px; z-index: 100; }
    .modal-overlay.open { display: flex; animation: fade .3s ease; }
    @keyframes fade { from { opacity: 0; } }
    .modal { background: #fff; border-radius: 18px; max-width: 760px; width: 100%; max-height: 94vh; overflow: hidden;
      display: flex; flex-direction: column; animation: modalIn .35s cubic-bezier(.2,.7,.2,1); }
    @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(.97); } }
    .modal .carousel { aspect-ratio: 16/9; flex-shrink: 0; border-radius: 0; }
    .modal .car-btn { opacity: 1; }
    .modal-close { position: absolute; top: 14px; right: 14px; width: 38px; height: 38px; border-radius: 50%;
      background: rgba(0,0,0,.55); color: #fff; border: none; cursor: pointer; font-size: 1.4rem; line-height: 1; z-index: 3;
      display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: rgba(0,0,0,.8); }
    .modal-body { padding: 24px 28px 28px; overflow-y: auto; }
    .modal-body h2 { font-size: 2rem; color: var(--green-dark); }
    .modal-body h2 em { font-style: italic; color: var(--terra); }
    .modal-cap { color: var(--muted); font-size: .9rem; margin: 4px 0 14px; }
    .modal-body p.desc { color: #444; margin-bottom: 18px; }
    .modal-body h4 { font-size: 1rem; color: var(--green-dark); margin-bottom: 10px; font-family: 'Inter', sans-serif; font-weight: 700; }
    .amen { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
    .amen span { background: #f3efe5; border: 1px solid var(--line); color: var(--green-dark); font-size: .84rem; padding: 7px 14px; border-radius: 50px; }
    .modal-foot { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
      border-top: 1px solid var(--line); padding-top: 18px; }
    .modal-foot .price { font-family: 'Cormorant Garamond', serif; font-size: 2.1rem; color: var(--terra); font-weight: 600; }
    .modal-foot .price small { font-family: 'Inter', sans-serif; font-size: .82rem; color: var(--muted); font-weight: 400; }
    .modal-foot .btn { padding: 13px 30px; }

    @media (max-width: 620px) {
      .head { padding: 44px 0 100px; }
      .car-btn { opacity: 1; width: 34px; height: 34px; }
      .cab-actions { flex-direction: column; }
      .modal-foot { justify-content: center; text-align: center; }
      .modal-foot .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="container">
      <a href="index.html" class="brand">
        <img src="https://res.cloudinary.com/dxfgqsp8y/image/upload/f_auto,q_auto/v1780009812/ventana-al-llano/logo_png.png" alt="Ventana al Llano">
        <span><b>Ventana al Llano</b><small>Cabañas · Restrepo, Meta</small></span>
      </a>
      <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>
  </div>

  <div class="head">
    <div class="container">
      <h1>Nuestras <em>cabañas</em></h1>
      <p>Tres refugios únicos para desconectarte. Explora las fotos, mira lo que incluye cada una y reserva la tuya.</p>
    </div>
  </div>

  <div class="wrap">
    <div class="container">
      <div class="cab-grid" id="cabGrid"><div class="loading">Cargando cabañas...</div></div>
    </div>
  </div>

  <!-- Modal detalles -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="carousel" id="mCar">
        <div class="car-track" id="mTrack"></div>
        <button class="car-btn prev" type="button">‹</button>
        <button class="car-btn next" type="button">›</button>
        <div class="car-dots"></div>
        <button class="modal-close" id="mClose" aria-label="Cerrar">×</button>
      </div>
      <div class="modal-body">
        <h2 id="mNombre"></h2>
        <div class="modal-cap" id="mCap"></div>
        <p class="desc" id="mDesc"></p>
        <h4>¿Qué incluye?</h4>
        <div class="amen" id="mAmen"></div>
        <div class="modal-foot">
          <div class="price" id="mPrice"></div>
          <a class="btn btn-primary" id="mReservar">Reservar esta cabaña</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fmt = (n) => '$' + Number(n || 0).toLocaleString('es-CO');
    const $ = (id) => document.getElementById(id);

    // Fotos por cabaña (Cloudinary)
    const C = 'https://res.cloudinary.com/dxfgqsp8y/image/upload/f_auto,q_auto/';
    const GALERIA = {
      'el-chiguiro': [
        'v1780009784/ventana-al-llano/cabana-chiguiro/SaveClip_App_649228377_18009669110835757_978800948885697982_n.jpg',
        'v1780009785/ventana-al-llano/cabana-chiguiro/SaveClip_App_650623257_18074100920631934_4467133859214566639_n.jpg',
        'v1780009785/ventana-al-llano/cabana-chiguiro/SaveClip_App_650969980_18093296381019477_2660021239446078146_n.jpg',
        'v1780009786/ventana-al-llano/cabana-chiguiro/SaveClip_App_652760496_18074508683396632_6107894147082596648_n.jpg',
        'v1780009787/ventana-al-llano/cabana-chiguiro/SaveClip_App_652858204_18129370705550139_3983451949691266276_n.jpg',
        'v1780009787/ventana-al-llano/cabana-chiguiro/SaveClip_App_653853809_18083586410613321_8112173762396990558_n.jpg',
      ],
      'el-mico': [
        'v1780009791/ventana-al-llano/cabana-mico-glamping/SaveClip_App_642556274_18096203750292440_2958544728974809294_n.jpg',
        'v1780009792/ventana-al-llano/cabana-mico-glamping/SaveClip_App_650899613_18044006543744422_5652850326515313812_n.jpg',
        'v1780009792/ventana-al-llano/cabana-mico-glamping/SaveClip_App_652365753_18085417691003334_2482436460336958704_n.jpg',
        'v1780009793/ventana-al-llano/cabana-mico-glamping/SaveClip_App_652526785_18098949289760832_9201503867486485467_n.jpg',
        'v1780009794/ventana-al-llano/cabana-mico-glamping/SaveClip_App_654035105_18159387007427409_3338780275465560452_n.jpg',
        'v1780009794/ventana-al-llano/cabana-mico-glamping/SaveClip_App_654697589_18095429591007289_5993881658342603630_n.jpg',
      ],
      'el-perezoso': [
        'v1780009802/ventana-al-llano/cabana-perezoso/SaveClip_App_650621249_18082119707588204_1388314393573503417_n.jpg',
        'v1780009803/ventana-al-llano/cabana-perezoso/SaveClip_App_651633018_18082309697342566_8121614446505987802_n.jpg',
        'v1780009803/ventana-al-llano/cabana-perezoso/SaveClip_App_652102523_18099916067302371_5609036293280606756_n.jpg',
        'v1780009804/ventana-al-llano/cabana-perezoso/SaveClip_App_652525191_18149381797476076_7094192785623621262_n.jpg',
        'v1780009805/ventana-al-llano/cabana-perezoso/SaveClip_App_654019205_18105795883853785_4320786210843869773_n.jpg',
        'v1780009806/ventana-al-llano/cabana-perezoso/SaveClip_App_654021443_18114906877674015_7363854065253476626_n.jpg',
      ],
    };
    // Descripción y amenidades por cabaña
    const DETALLE = {
      'el-chiguiro': {
        contiene: 'Cabaña espaciosa en madera para hasta 6 personas, ideal para familias o grupos. Incluye camas cómodas, baño privado, ventilación para el clima cálido del llano, WiFi y acceso directo a las zonas verdes, la piscina infinita y el restaurante.',
        incluye: ['🛏 Hasta 6 personas', '🚿 Baño privado', '🌳 Vista al jardín', '📶 WiFi', '🌡️ Clima cálido', '🅿️ Parqueadero', '🏊 Acceso a piscina'],
      },
      'el-mico': {
        contiene: 'Nuestro glamping insignia, pensado para parejas. Una experiencia íntima rodeada de naturaleza, con decoración romántica, cielo estrellado y todas las comodidades de un hotel boutique. Opción de jacuzzi. Perfecto para aniversarios y escapadas en pareja.',
        incluye: ['💑 Ideal para parejas', '✨ Estilo glamping', '🌃 Cielo estrellado', '🛁 Jacuzzi opcional', '🌸 Decoración romántica', '📶 WiFi', '🏊 Acceso a piscina'],
      },
      'el-perezoso': {
        contiene: 'Refugio tranquilo para hasta 4 personas, con acabados rústicos, hamacas, cocineta y un ventanal panorámico hacia el bosque. Pensado para descansar al ritmo que tu cuerpo necesita, en medio del silencio y el verde.',
        incluye: ['🛌 Hasta 4 personas', '🌿 Vista al bosque', '🪵 Acabados rústicos', '☕ Cocineta', '🪟 Ventanal panorámico', '📶 WiFi', '🏊 Acceso a piscina'],
      },
    };

    let CABANAS = [];

    function fotosDe(c) {
      const g = GALERIA[c.slug];
      return (g && g.length) ? g.map((p) => C + p) : [c.imagen];
    }

    async function load() {
      try {
        CABANAS = await fetch('/api/cabanas').then((r) => r.json());
        if (!Array.isArray(CABANAS) || !CABANAS.length) {
          $('cabGrid').innerHTML = '<div class="error">No hay cabañas disponibles por ahora.</div>';
          return;
        }
        render();
      } catch (e) {
        $('cabGrid').innerHTML = '<div class="error">No se pudieron cargar las cabañas. Intenta recargar la página.</div>';
      }
    }

    function carouselHTML(fotos, nombre) {
      const slides = fotos.map((src, i) =>
        `<img class="car-slide" src="${src}" alt="${nombre} foto ${i + 1}" ${i ? 'loading="lazy"' : ''}>`).join('');
      return `<div class="car-track">${slides}</div>
        <button class="car-btn prev" type="button" aria-label="Anterior">‹</button>
        <button class="car-btn next" type="button" aria-label="Siguiente">›</button>
        <div class="car-dots"></div>`;
    }

    function render() {
      $('cabGrid').innerHTML = CABANAS.map((c, idx) => {
        const fotos = fotosDe(c);
        const det = DETALLE[c.slug] || {};
        const desc = det.contiene || c.descripcion || '';
        const chips = (det.incluye || []).slice(0, 4);
        return `
        <div class="cab" style="animation-delay:${idx * 0.08}s">
          <div class="carousel" data-car>
            <span class="cab-tag">Hasta ${c.capacidad} personas</span>
            <span class="car-count">📷 ${fotos.length}</span>
            ${carouselHTML(fotos, c.nombre)}
          </div>
          <div class="cab-body">
            <h3>${c.nombre}</h3>
            <p class="cab-desc">${desc}</p>
            <div class="incluye">${chips.map((a) => `<span>${a}</span>`).join('')}</div>
            <div class="price-row"><span class="price">${fmt(c.precio_noche)}</span><span class="per">/ noche</span></div>
            <div class="cab-actions">
              <button class="btn btn-ghost" data-detalle="${c.id}">Ver detalles</button>
              <a class="btn btn-primary" href="reservar.html?cabana=${c.slug}">Reservar</a>
            </div>
          </div>
        </div>`;
      }).join('');

      document.querySelectorAll('[data-car]').forEach((el) => initCarousel(el));
      document.querySelectorAll('[data-detalle]').forEach((b) =>
        b.addEventListener('click', () => abrirModal(Number(b.dataset.detalle))));
    }

    // ---- Carrusel reutilizable ----
    function initCarousel(el) {
      const track = el.querySelector('.car-track');
      const slides = [...el.querySelectorAll('.car-slide')];
      const dotsWrap = el.querySelector('.car-dots');
      let i = 0, timer = null;
      dotsWrap.innerHTML = slides.map((_, k) => `<button type="button" data-k="${k}" aria-label="Foto ${k + 1}"></button>`).join('');
      const dots = [...dotsWrap.children];
      const go = (n) => {
        i = (n + slides.length) % slides.length;
        track.style.transform = `translateX(${-i * 100}%)`;
        dots.forEach((d, k) => d.classList.toggle('active', k === i));
      };
      const reset = () => { if (slides.length < 2) return; clearInterval(timer); timer = setInterval(() => go(i + 1), 5000); };
      el.querySelector('.prev').addEventListener('click', (e) => { e.stopPropagation(); go(i - 1); reset(); });
      el.querySelector('.next').addEventListener('click', (e) => { e.stopPropagation(); go(i + 1); reset(); });
      dots.forEach((d) => d.addEventListener('click', (e) => { e.stopPropagation(); go(+d.dataset.k); reset(); }));
      let sx = null;
      el.addEventListener('touchstart', (e) => { sx = e.touches[0].clientX; }, { passive: true });
      el.addEventListener('touchend', (e) => {
        if (sx == null) return;
        const dx = e.changedTouches[0].clientX - sx;
        if (Math.abs(dx) > 40) go(dx < 0 ? i + 1 : i - 1);
        sx = null; reset();
      }, { passive: true });
      el.addEventListener('mouseenter', () => clearInterval(timer));
      el.addEventListener('mouseleave', reset);
      go(0); reset();
      el._stop = () => clearInterval(timer);
      return el;
    }

    // ---- Modal ----
    function abrirModal(id) {
      const c = CABANAS.find((x) => x.id === id);
      if (!c) return;
      const det = DETALLE[c.slug] || {};
      const fotos = fotosDe(c);
      if ($('mCar')._stop) $('mCar')._stop();
      $('mTrack').innerHTML = fotos.map((src, i) =>
        `<img class="car-slide" src="${src}" alt="${c.nombre} foto ${i + 1}" ${i ? 'loading="lazy"' : ''}>`).join('');
      initCarousel($('mCar'));
      $('mNombre').textContent = c.nombre;
      $('mCap').textContent = `Hasta ${c.capacidad} personas`;
      $('mDesc').textContent = det.contiene || c.descripcion || '';
      $('mAmen').innerHTML = (det.incluye || []).map((a) => `<span>${a}</span>`).join('');
      $('mPrice').innerHTML = `${fmt(c.precio_noche)} <small>/ noche</small>`;
      $('mReservar').href = `reservar.html?cabana=${c.slug}`;
      $('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function cerrarModal() {
      if ($('mCar')._stop) $('mCar')._stop();
      $('modal').classList.remove('open');
      document.body.style.overflow = '';
    }
    $('mClose').addEventListener('click', cerrarModal);
    $('modal').addEventListener('click', (e) => { if (e.target === $('modal')) cerrarModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

    load();
  </script>
</body>
</html>
